<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Привычки</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #060d1f;
  --surface: #0d1a35;
  --surface2: #112040;
  --accent: #2563eb;
  --accent2: #3b82f6;
  --red: #ef4444;
  --green: #10b981;
  --gold: #f59e0b;
  --text: #e2e8f0;
  --muted: #64748b;
  --border: rgba(255,255,255,0.07);
  --glow: rgba(37,99,235,0.25);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(37,99,235,0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(124,58,237,0.07) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* ── LAYOUT ── */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  padding-bottom: calc(80px + var(--safe-bottom));
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 16px 12px;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(6,13,31,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.avatar {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--glow);
}

h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: 18px;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 40%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex: 1;
  text-align: center;
}

.month-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.month-btn {
  width: 34px; height: 34px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  touch-action: manipulation;
}
.month-btn:active { background: var(--accent); }

.month-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  min-width: 90px;
  text-align: center;
}

/* ── STATS CARDS ── */
.stats-row {
  display: flex;
  gap: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-row::-webkit-scrollbar { display: none; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 16px;
  flex: 1;
  min-width: 100px;
  flex-shrink: 0;
}

.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
  margin-bottom: 4px;
}

.stat-val {
  font-family: 'Unbounded', sans-serif;
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.stat-bar-wrap {
  margin-top: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  height: 3px;
  overflow: hidden;
}
.stat-bar {
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s ease;
}

/* ── TABLE ── */
.table-wrap {
  flex: 1;
  overflow-x: auto;
  overflow-y: visible;
  -webkit-overflow-scrolling: touch;
  margin: 0 16px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--surface);
  box-shadow: 0 4px 32px rgba(0,0,0,0.4);
}

table {
  border-collapse: collapse;
  width: max-content;
  min-width: 100%;
}

/* sticky name column */
th.name-col, td.name-col {
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--surface2);
  min-width: 190px;
  max-width: 190px;
  width: 190px;
}
td.name-col { background: var(--surface); }

thead tr th {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  background: var(--surface2);
  padding: 10px 0;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  min-width: 40px;
}

thead th.name-col {
  text-align: left;
  padding-left: 14px;
  font-size: 11px;
}

th.today-th { color: var(--accent2) !important; }
th.weekend-th { color: var(--red) !important; opacity: 0.8; }

tbody tr {
  border-bottom: 1px solid var(--border);
  animation: rowIn 0.25s ease both;
}
tbody tr:last-child { border-bottom: none; }

@keyframes rowIn {
  from { opacity: 0; transform: translateX(6px); }
  to { opacity: 1; transform: translateX(0); }
}

.habit-name-cell {
  padding: 10px 8px 10px 14px;
  border-right: 1px solid var(--border);
}

.habit-row {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
}

.h-emoji { font-size: 15px; flex-shrink: 0; }
.h-text { overflow: hidden; text-overflow: ellipsis; max-width: 140px; white-space: nowrap; }

.del-btn {
  background: none;
  border: none;
  color: var(--red);
  font-size: 13px;
  cursor: pointer;
  padding: 2px 4px;
  opacity: 0.5;
  flex-shrink: 0;
  touch-action: manipulation;
}
.del-btn:active { opacity: 1; }

/* checkbox cells */
td.check-cell {
  text-align: center;
  padding: 0;
  min-width: 40px;
}
td.check-cell.today-td { background: rgba(37,99,235,0.07); }

.cb {
  width: 26px; height: 26px;
  border: 2px solid rgba(255,255,255,0.14);
  border-radius: 7px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin: 8px 7px;
  font-size: 14px;
  transition: all 0.15s;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
}
.cb.done {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 10px rgba(37,99,235,0.45);
}
.cb.today-cb { border-color: rgba(37,99,235,0.5); }
.cb:active { transform: scale(0.88); }

/* foot row */
tfoot tr td {
  text-align: center;
  padding: 8px 0;
  font-size: 11px;
  font-weight: 700;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
tfoot td.name-col {
  text-align: left;
  padding-left: 14px;
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
}

/* ── EMPTY ── */
.empty {
  padding: 48px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 15px;
}

/* ── BOTTOM ADD BAR ── */
.add-bar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  padding: 12px 16px calc(12px + var(--safe-bottom));
  background: rgba(6,13,31,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  z-index: 100;
}

.emoji-picker { position: relative; }

.emoji-btn {
  width: 46px; height: 46px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
  transition: border-color 0.15s;
}
.emoji-btn:active { border-color: var(--accent); }

.emoji-grid {
  position: absolute;
  bottom: calc(100% + 10px);
  left: 0;
  width: 220px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  z-index: 200;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
}
.emoji-grid.open { display: flex; }
.e-opt {
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
  border-radius: 8px;
  touch-action: manipulation;
}
.e-opt:active { background: rgba(255,255,255,0.1); }

.add-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  -webkit-appearance: none;
}
.add-input:focus { border-color: var(--accent); }
.add-input::placeholder { color: var(--muted); }

.add-btn {
  width: 46px; height: 46px;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  touch-action: manipulation;
  transition: background 0.15s;
}
.add-btn:active { background: var(--accent2); transform: scale(0.95); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="avatar">🏆</div>
    <h1>Привычки</h1>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Прогресс</div>
      <div class="stat-val" id="sPct">0%</div>
      <div class="stat-bar-wrap"><div class="stat-bar" id="sBar1" style="width:0%;background:linear-gradient(90deg,#2563eb,#7c3aed)"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Выполнено</div>
      <div class="stat-val" id="sDone">0</div>
      <div class="stat-bar-wrap"><div class="stat-bar" id="sBar2" style="width:0%;background:linear-gradient(90deg,#10b981,#059669)"></div></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Подряд 🔥</div>
      <div class="stat-val" id="sStreak">0</div>
      <div class="stat-bar-wrap"><div class="stat-bar" id="sBar3" style="width:0%;background:linear-gradient(90deg,#f59e0b,#ef4444)"></div></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap" id="tableWrap">
    <div class="empty" id="emptyMsg">Добавьте первую привычку ☝️</div>
    <table id="tbl" style="display:none">
      <thead id="tHead"></thead>
      <tbody id="tBody"></tbody>
      <tfoot id="tFoot"></tfoot>
    </table>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="add-bar">
  <div class="emoji-picker">
    <button class="emoji-btn" id="eBtn" onclick="toggleEmoji()">🤘</button>
    <div class="emoji-grid" id="eGrid">
      <span class="e-opt" onclick="pickE('🤘')">🤘</span>
      <span class="e-opt" onclick="pickE('🥚')">🥚</span>
      <span class="e-opt" onclick="pickE('⚽')">⚽</span>
      <span class="e-opt" onclick="pickE('👔')">👔</span>
      <span class="e-opt" onclick="pickE('😘')">😘</span>
      <span class="e-opt" onclick="pickE('🇬🇧')">🇬🇧</span>
      <span class="e-opt" onclick="pickE('🍺')">🍺</span>
      <span class="e-opt" onclick="pickE('📚')">📚</span>
      <span class="e-opt" onclick="pickE('💪')">💪</span>
      <span class="e-opt" onclick="pickE('🧘')">🧘</span>
      <span class="e-opt" onclick="pickE('💧')">💧</span>
      <span class="e-opt" onclick="pickE('🌙')">🌙</span>
      <span class="e-opt" onclick="pickE('🏃')">🏃</span>
      <span class="e-opt" onclick="pickE('✍️')">✍️</span>
      <span class="e-opt" onclick="pickE('🎯')">🎯</span>
      <span class="e-opt" onclick="pickE('🎸')">🎸</span>
      <span class="e-opt" onclick="pickE('🥗')">🥗</span>
      <span class="e-opt" onclick="pickE('🚫')">🚫</span>
      <span class="e-opt" onclick="pickE('⭐')">⭐</span>
      <span class="e-opt" onclick="pickE('🔥')">🔥</span>
    </div>
  </div>
  <input class="add-input" id="hInput" type="text" placeholder="Новая привычка..." onkeydown="if(event.key==='Enter')addHabit()">
  <button class="add-btn" onclick="addHabit()">+</button>
</div>

<script>
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS   = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];

// --- State ---
const TODAY = new Date();
TODAY.setHours(0,0,0,0);
let viewY = TODAY.getFullYear();
let viewM = TODAY.getMonth();
let selEmoji = '🤘';
let habits = [], checks = {};

// --- Storage ---
function save() { localStorage.setItem('htrk3', JSON.stringify({habits, checks})); }
function load() {
  try {
    const raw = localStorage.getItem('htrk3');
    if (!raw) {
      // First run — clear any old keys from previous versions
      ['habits_v2','habits_v1'].forEach(k => localStorage.removeItem(k));
      habits = defaults();
      checks = {};
      return;
    }
    const d = JSON.parse(raw);
    habits = d.habits || defaults();
    checks = d.checks || {};
  } catch { habits = defaults(); checks = {}; }
}
function defaults() {
  return [
    {id:1, emoji:'🤘', name:'Открывать таблицу каждый день'},
    {id:2, emoji:'🥚', name:'Белковый завтрак'},
    {id:3, emoji:'⚽', name:'Физическая активность 30 мин'},
    {id:4, emoji:'👔', name:'Подготовить одежду на утро'},
    {id:5, emoji:'😘', name:'Убрать гаджеты за час до сна'},
    {id:6, emoji:'🇬🇧', name:'Занятия английским'},
  ];
}

// --- Key: always explicit y, m, d ---
function key(hid, y, m, d) { return `${hid}|${y}|${m}|${d}`; }

function daysIn(y, m) { return new Date(y, m+1, 0).getDate(); }

// --- Render ---
function render() {
  const days = daysIn(viewY, viewM);
  const isCurrentMonth = (viewY === TODAY.getFullYear() && viewM === TODAY.getMonth());
  const todayD = isCurrentMonth ? TODAY.getDate() : -1;

  document.getElementById('monthLabel').textContent = MONTHS[viewM].slice(0,3) + ' ' + viewY;

  const empty   = document.getElementById('emptyMsg');
  const tbl     = document.getElementById('tbl');
  const statRow = document.getElementById('statsRow');

  if (!habits.length) {
    empty.style.display = '';
    tbl.style.display   = 'none';
    statRow.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  tbl.style.display   = '';
  statRow.style.display = '';

  // HEAD
  let h = `<tr><th class="name-col">Привычка</th>`;
  for (let d = 1; d <= days; d++) {
    const dow = new Date(viewY, viewM, d).getDay();
    const isToday = d === todayD;
    const isWE = dow === 0 || dow === 6;
    h += `<th class="${isToday?'today-th':''} ${isWE?'weekend-th':''}">
            <div>${DAYS[dow]}</div>
            <div style="font-size:11px;font-weight:700">${d}</div>
          </th>`;
  }
  h += '</tr>';
  document.getElementById('tHead').innerHTML = h;

  // BODY
  let b = '';
  habits.forEach((hb, idx) => {
    b += `<tr style="animation-delay:${idx*0.03}s">
      <td class="name-col habit-name-cell">
        <div class="habit-row">
          <span class="h-emoji">${hb.emoji}</span>
          <span class="h-text">${hb.name}</span>
          <button class="del-btn" onclick="delHabit(${hb.id})">✕</button>
        </div>
      </td>`;
    for (let d = 1; d <= days; d++) {
      const k = key(hb.id, viewY, viewM, d);
      const done = !!checks[k];
      const isToday = d === todayD;
      b += `<td class="check-cell ${isToday?'today-td':''}">
              <div class="cb ${done?'done':''} ${isToday&&!done?'today-cb':''}"
                   onclick="toggle(${hb.id},${viewY},${viewM},${d},this)">
                ${done?'✓':''}
              </div>
            </td>`;
    }
    b += '</tr>';
  });
  document.getElementById('tBody').innerHTML = b;

  // FOOT + progress calc
  let f = `<tr><td class="name-col">Выполнено</td>`;
  let totPossible = 0, totDone = 0;
  for (let d = 1; d <= days; d++) {
    let cnt = habits.filter(hb => checks[key(hb.id, viewY, viewM, d)]).length;
    const col = cnt === habits.length && cnt > 0 ? '#10b981' : cnt > 0 ? '#3b82f6' : 'var(--muted)';
    f += `<td style="color:${col}">${cnt}</td>`;
    if (d <= todayD || todayD === -1) { totPossible += habits.length; totDone += cnt; }
  }
  f += '</tr>';
  document.getElementById('tFoot').innerHTML = f;

  // Stats
  const pct = totPossible > 0 ? Math.round(totDone / totPossible * 100) : 0;
  document.getElementById('sPct').textContent  = pct + '%';
  document.getElementById('sBar1').style.width = pct + '%';
  document.getElementById('sDone').textContent = totDone;
  document.getElementById('sBar2').style.width = (totPossible > 0 ? Math.round(totDone/totPossible*100) : 0) + '%';

  // STREAK — count back from today using explicit keys
  let streak = 0;
  if (habits.length > 0) {
    const cur = new Date(TODAY);
    for (let i = 0; i < 366; i++) {
      const sy = cur.getFullYear(), sm = cur.getMonth(), sd = cur.getDate();
      const anyDone = habits.some(hb => !!checks[key(hb.id, sy, sm, sd)]);
      if (anyDone) { streak++; cur.setDate(cur.getDate() - 1); }
      else break;
    }
  }
  document.getElementById('sStreak').textContent = streak;
  document.getElementById('sBar3').style.width   = Math.min(streak * 10, 100) + '%';

  // Scroll today column into view on first render
  if (isCurrentMonth && todayD > 0 && !render._scrolled) {
    render._scrolled = true;
    setTimeout(() => {
      const wrap = document.getElementById('tableWrap');
      // approx 190px name col + 40px per day
      wrap.scrollLeft = Math.max(0, (todayD - 3) * 40);
    }, 100);
  }
}

// --- Actions ---
function toggle(hid, y, m, d, el) {
  const k = key(hid, y, m, d);
  checks[k] = !checks[k];
  el.classList.toggle('done', checks[k]);
  el.classList.toggle('today-cb', !checks[k]);
  el.textContent = checks[k] ? '✓' : '';
  if (checks[k]) {
    el.style.transform = 'scale(1.25)';
    setTimeout(() => el.style.transform = '', 180);
  }
  save();
  // Re-render stats only (avoid rebuilding whole DOM on every tap)
  renderStats();
}

function renderStats() {
  // Recompute streak + progress without full re-render
  const days = daysIn(viewY, viewM);
  const isCurrentMonth = (viewY === TODAY.getFullYear() && viewM === TODAY.getMonth());
  const todayD = isCurrentMonth ? TODAY.getDate() : -1;
  let totPossible = 0, totDone = 0;
  for (let d = 1; d <= days; d++) {
    let cnt = habits.filter(hb => checks[key(hb.id, viewY, viewM, d)]).length;
    if (d <= todayD || todayD === -1) { totPossible += habits.length; totDone += cnt; }
  }
  const pct = totPossible > 0 ? Math.round(totDone / totPossible * 100) : 0;
  document.getElementById('sPct').textContent  = pct + '%';
  document.getElementById('sBar1').style.width = pct + '%';
  document.getElementById('sDone').textContent = totDone;
  document.getElementById('sBar2').style.width = (totPossible > 0 ? Math.round(totDone/totPossible*100) : 0) + '%';

  let streak = 0;
  if (habits.length > 0) {
    const cur = new Date(TODAY);
    for (let i = 0; i < 366; i++) {
      const sy = cur.getFullYear(), sm = cur.getMonth(), sd = cur.getDate();
      const anyDone = habits.some(hb => !!checks[key(hb.id, sy, sm, sd)]);
      if (anyDone) { streak++; cur.setDate(cur.getDate() - 1); }
      else break;
    }
  }
  document.getElementById('sStreak').textContent = streak;
  document.getElementById('sBar3').style.width   = Math.min(streak * 10, 100) + '%';

  // update foot row counts
  const rows = document.querySelectorAll('#tFoot tr td');
  let col = 1;
  for (let d = 1; d <= days; d++) {
    if (rows[col]) {
      let cnt = habits.filter(hb => checks[key(hb.id, viewY, viewM, d)]).length;
      rows[col].textContent = cnt;
      rows[col].style.color = cnt === habits.length && cnt > 0 ? '#10b981' : cnt > 0 ? '#3b82f6' : 'var(--muted)';
    }
    col++;
  }
}

function addHabit() {
  const inp = document.getElementById('hInput');
  const name = inp.value.trim();
  if (!name) return;
  habits.push({id: Date.now(), emoji: selEmoji, name});
  inp.value = '';
  inp.blur();
  save();
  render._scrolled = false;
  render();
}

function delHabit(id) {
  habits = habits.filter(h => h.id !== id);
  save();
  render();
}

function changeMonth(delta) {
  viewM += delta;
  if (viewM > 11) { viewM = 0; viewY++; }
  if (viewM < 0)  { viewM = 11; viewY--; }
  render._scrolled = false;
  render();
}

function toggleEmoji() {
  document.getElementById('eGrid').classList.toggle('open');
}

function pickE(e) {
  selEmoji = e;
  document.getElementById('eBtn').textContent = e;
  document.getElementById('eGrid').classList.remove('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-picker')) document.getElementById('eGrid').classList.remove('open');
});

// Init
load();
render();
</script>
</body>
</html>
